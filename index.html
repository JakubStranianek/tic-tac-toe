<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="styles/style.css">
  <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.7.1/jquery.min.js"></script> 
  
  <title>Frontend Mentor | Tic Tac Toe</title>
</head>
<body>

  <div class="newGameStart">
     <div class="newGame">
        <section>
          <img src="assets/icon-x.svg" alt="icon-x">
          <img src="assets/icon-o.svg" alt="icon-o">
        </section>

        <div class="pickPlayer">
          <h1>Pick player 1's mark</h1>
          <div class="buttonsWrapper">
            <button><img src="assets/icon-x-outline.svg" alt="icon-x-outline"></button>
            <button><img src="assets/icon-o-outline.svg" alt="icon-o-outline"></button>
          </div>
          <p>Remember: X goes first</p>
        </div>

        <div class="gameChoose">
          <button class="yellow" onmousedown="checkFocus();">New Game (vs CPU)</button>
          <button class="blue" onmousedown="checkFocus();">New Game (vs player)</button>
        </div>
     </div>

     <div class="gameStart">
        <header>
          <div>
            <img src="assets/icon-x.svg" alt="icon-x">
            <img src="assets/icon-o.svg" alt="icon-o">
          </div>

          <div class="infoTurn">
              <img src="assets/icon-x-outline.svg" id="whoGo" alt="icon-x-out">
              <h2>TURN</h2>
          </div>
          <button><img src="assets/icon-restart.svg" alt="icon-restart"></button>
        </header>

        <main class="grid">
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>
        </main>

        <footer class="grid"> 
          <div class="grid-item1 gridBlue">
              <p>X (YOU)</p>
              <h3>0</h3>
          </div>
          <div class="grid-item1 gridSilver">
              <p>TIES</p>
              <h3>0</h3>
          </div>
          <div class="grid-item1 gridYellow">
              <p>O (CPU)</p>
              <h3>0</h3>
          </div>
        </footer>
     </div>

     <div class="popup">
       <div class="wrapper">
        <p>OH NO, YOU LOST...</p>
        <div class="flexRow">
          <img src="assets/icon-o.svg" alt="icon-o">
          <h1>TAKES THE ROUND</h1>  
        </div>

        <div class="flexRow">
          <button onclick="quit()">QUIT</button>
          <button onclick="nextRound()">NEXT ROUND</button>
        </div>
       </div>
     </div>

  </div>

  
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
